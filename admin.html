<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - NexusHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <nav>
    <div class="nav-brand">🎮 NexusHub <span class="admin-badge">ADMIN</span></div>
    <div class="nav-links">
      <a href="index.html">← Store</a>
      <span id="adminEmail" class="nav-user"></span>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <button class="tab-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
      <button class="tab-btn" onclick="showTab('payments')">💳 Payments</button>
      <button class="tab-btn" onclick="showTab('products')">📦 Products</button>
      <button class="tab-btn" onclick="showTab('users')">👥 Users</button>
      <button class="tab-btn" onclick="showTab('orders')">🛒 Orders</button>
    </aside>

    <main class="admin-main">

      <!-- Dashboard Tab -->
      <div id="tab-dashboard" class="tab-content">
        <h2>Dashboard</h2>
        <div class="stats-grid" id="statsGrid"><div class="stat-card loading">Loading...</div></div>
        <h3 style="margin-top:2rem;">Recent Orders</h3>
        <div id="recentOrders"><p>Loading...</p></div>
      </div>

      <!-- Payments Tab -->
      <div id="tab-payments" class="tab-content hidden">
        <div class="tab-header">
          <h2>Pending Payment Verifications</h2>
          <button class="btn-primary btn-sm" onclick="loadPendingPayments()">🔄 Refresh</button>
        </div>
        <p style="color:#9ca3af;font-size:.9rem;margin-bottom:16px;">Review UTR numbers submitted by users. Approve to grant download access, or Reject to decline.</p>
        <div id="paymentsTable"><p>Loading...</p></div>
      </div>

      <!-- Products Tab -->
      <div id="tab-products" class="tab-content hidden">
        <div class="tab-header">
          <h2>Products</h2>
          <button class="btn-primary btn-sm" onclick="openProductModal()">+ Add Product</button>
        </div>
        <div id="productTable"><p>Loading...</p></div>
      </div>

      <!-- Users Tab -->
      <div id="tab-users" class="tab-content hidden">
        <h2>Users</h2>
        <div id="userTable"><p>Loading...</p></div>
      </div>

      <!-- Orders Tab -->
      <div id="tab-orders" class="tab-content hidden">
        <h2>All Orders</h2>
        <div id="ordersTable"><p>Loading...</p></div>
      </div>

    </main>
  </div>

  <!-- Product Modal -->
  <div id="productModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitle">Add Product</h3>
        <button onclick="closeProductModal()" class="modal-close">✕</button>
      </div>
      <form id="productForm">
        <input type="hidden" id="productId">
        <label>Product ID <span class="required">*</span></label>
        <input type="text" id="pProductId" placeholder="e.g. prod_001" required>
        <label>Name <span class="required">*</span></label>
        <input type="text" id="pName" placeholder="Product name" required>
        <label>Description</label>
        <textarea id="pDescription" placeholder="Short description" rows="3"></textarea>
        <label>Price (₹) <span class="required">*</span></label>
        <input type="number" id="pPrice" placeholder="e.g. 499" min="1" required>
        <label>Download Link <span class="required">*</span></label>
        <input type="url" id="pFileLink" placeholder="https://..." required>
        <label>Image URL</label>
        <input type="url" id="pImage" placeholder="https://... (optional)">
        <label>Active</label>
        <select id="pActive">
          <option value="TRUE">Yes – visible in store</option>
          <option value="FALSE">No – hidden</option>
        </select>
        <div class="modal-actions">
          <button type="button" onclick="closeProductModal()" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary">Save Product</button>
        </div>
        <div id="productFormMsg"></div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store - NexusHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="nav-brand">🎮 NexusHub</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="store.html" class="active">Store</a>
      <a href="downloads.html">My Downloads</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>
  <main>
    <h2>🛒 Game Store</h2>
    <div id="productGrid" class="product-grid"><p>Loading products...</p></div>
  </main>

  <!-- Payment Modal -->
  <div id="paymentModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Complete Payment</h3>
        <button onclick="closePaymentModal()" class="modal-close">✕</button>
      </div>
      <div style="margin-bottom:16px;">
        <p><strong>Product:</strong> <span id="modalProductName"></span></p>
        <p><strong>Amount:</strong> <span id="modalProductPrice"></span></p>
      </div>
      <div style="background:#1e1b4b;border:1px solid #4c1d95;border-radius:8px;padding:16px;margin-bottom:16px;">
        <p style="color:#a78bfa;font-weight:600;margin:0 0 8px;">Pay via UPI</p>
        <p style="font-size:.9rem;color:#c4b5fd;margin:0 0 4px;">UPI ID: <strong style="color:#fff">${process.env.UPI_ID || 'your-upi@bank'}</strong></p>
        <p style="font-size:.8rem;color:#9ca3af;margin:0;">After paying, enter the UTR / Transaction ID below</p>
      </div>
      <form id="paymentForm">
        <input type="hidden" id="paymentProductId">
        <label style="display:block;margin-bottom:6px;color:#c4b5fd;font-size:.9rem;">UTR / Transaction ID <span style="color:#f87171">*</span></label>
        <input type="text" id="utrInput" placeholder="e.g. 424212345678" style="width:100%;padding:10px;border-radius:6px;border:1px solid #4c1d95;background:#0f0a1e;color:#fff;font-size:.95rem;box-sizing:border-box;" required>
        <div id="paymentMsg" style="margin-top:10px;"></div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button type="button" onclick="closePaymentModal()" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary" style="flex:1;">Submit Payment</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/store.js"></script>
</body>
</html>
